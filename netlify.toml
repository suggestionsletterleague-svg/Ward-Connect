# Netlify configuration for Ward Connect

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-Page App fallback: every route serves index.html so React Router works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Make sure the service worker and manifest are always served fresh.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
