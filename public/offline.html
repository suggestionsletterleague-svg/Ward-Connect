<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Offline — Greenfield 1st Ward</title>
    <style>
      :root {
        --navy: #1e3a5f;
        --sage: #7c9885;
        --cream: #fbfaf7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--cream);
        color: var(--navy);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 24rem;
        background: #fff;
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 24px rgba(30, 58, 95, 0.12);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.25rem;
        border-radius: 50%;
        background: var(--sage);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.75rem;
      }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
      p { font-size: 1.0625rem; line-height: 1.6; color: #555; margin: 0 0 1.5rem; }
      button {
        background: var(--navy);
        color: #fff;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.85rem 1.75rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⛪</div>
      <h1>You're offline</h1>
      <p>
        Greenfield 1st Ward needs an internet connection to load new content.
        Previously viewed pages may still be available.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
